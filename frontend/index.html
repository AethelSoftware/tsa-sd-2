<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <!-- Performance: Preconnect to critical domains -->
    <link rel="preconnect" href="https://api.tomtom.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Performance: DNS Prefetch -->
    <link rel="dns-prefetch" href="https://api.tomtom.com" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    
    <!-- Performance: Preload critical assets -->
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <link rel="preload" as="script" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js" />
    
    <!-- Title -->
    <title>Tryver | Accessible Navigation</title>
    
    <!-- Performance: Resource hints -->
    <link rel="prefetch" href="/vite.svg" />
    
    <!-- Performance: Control rendering -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#110a04" />
    
    <!-- Performance: Disable tap highlight on mobile -->
    <style>
      /* Critical CSS - Inlined to avoid render blocking */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        background-color: #110a04;
      }
      
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        contain: strict;
      }
      
      /* Prevent white flash before React loads */
      .loading-screen {
        position: fixed;
        inset: 0;
        background: #110a04;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(232,168,112,0.2);
        border-top-color: #e8a870;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Hide loading screen when content is ready */
      .loading-screen.fade-out {
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Loading indicator - removes itself when React mounts -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- Performance: Defer non-critical scripts -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Performance: Remove loading screen after React mounts -->
    <script>
      (function() {
        // Wait for React to hydrate/mount
        if (document.getElementById('root')) {
          const observer = new MutationObserver(function(mutations) {
            if (document.getElementById('root')?.children.length > 0) {
              const loadingScreen = document.getElementById('loading-screen');
              if (loadingScreen) {
                loadingScreen.classList.add('fade-out');
                setTimeout(function() {
                  loadingScreen.remove();
                }, 400);
              }
              observer.disconnect();
            }
          });
          observer.observe(document.getElementById('root'), { childList: true, subtree: true });
          
          // Fallback timeout
          setTimeout(function() {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
              loadingScreen.classList.add('fade-out');
              setTimeout(function() { loadingScreen.remove(); }, 400);
            }
          }, 3000);
        }
      })();
    </script>
  </body>
</html>
